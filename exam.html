<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart - 在线考试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/unified-styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/unified-styles.css">
    <script src="js/daohanglan.js"></script>
    <script src="js/user-profile.js"></script>
    <style>
        .timer {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e53e3e;
        }
        .question-card {
            margin-bottom: 2rem;
        }
        .option-label {
            cursor: pointer;
        }
        .blur-warning {
            color: #e53e3e;
            font-weight: bold;
            display: none;
        }
    </style>
        <!-- face-api.js 用于AI人脸检测 -->
        <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
</head>
<body class="bg-gray-50 font-inter">
    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-pen-alt me-2 text-primary"></i>在线考试</h2>
            <div class="timer" id="timer">00:00</div>
        </div>
        <div class="alert alert-danger blur-warning" id="blurWarning">
            检测到切屏，请专心答题，切屏超过3次将自动交卷！
        </div>
        <div class="mb-4">
            <label for="examSelect" class="form-label">选择考试：</label>
            <select class="form-select w-auto d-inline-block" id="examSelect"></select>
            <button class="btn btn-primary ms-2" id="startExamBtn">开始考试</button>
        </div>
            <!-- 摄像头监控视频流（隐藏） -->
            <video id="ai-proctor-video" width="160" height="120" autoplay muted style="display:none;position:fixed;right:10px;top:10px;z-index:9999;"></video>
            <!-- 环境音检测提示 -->
            <div id="audio-alert" style="display:none;position:fixed;left:10px;top:10px;z-index:9999;background:rgba(255,255,0,0.8);padding:6px 12px;border-radius:6px;font-weight:bold;"></div>
        <div id="examPanel" style="display:none;">
            <form id="examForm">
                <div id="questionsContainer"></div>
                <div class="d-flex justify-content-between mt-4">
                    <button type="button" class="btn btn-secondary" id="saveProgressBtn">保存进度</button>
                    <button type="submit" class="btn btn-success">提交试卷</button>
                </div>
            </form>
        </div>
        <div id="resultPanel" style="display:none;"></div>
    </main>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/exam-page.js"></script>
</body>
</html>
