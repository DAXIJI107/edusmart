<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI学习代理 - EduSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/daohanglan.js"></script>
    <style>
        .log-item { border-left: 4px solid #667eea; }
    </style>
</head>
<body class="bg-gray-50">
    <main class="container mx-auto px-4 pt-24 pb-12">
        <h1 class="text-3xl font-bold mb-6"><i class="fas fa-robot text-primary me-2"></i>AI学习代理设置</h1>
        
        <div class="grid md:grid-cols-3 gap-6">
            <!-- 左侧：权限设置卡片 -->
            <div class="md:col-span-1">
                <div class="bg-white p-6 rounded-xl shadow-soft">
                    <h3 class="font-semibold mb-4"><i class="fas fa-shield-alt me-2 text-primary"></i>代理权限</h3>
                    <form id="permission-form">
                        <div class="mb-3">
                            <label class="flex items-center">
                                <input type="checkbox" class="form-checkbox rounded text-primary" id="allow_auto_tutor" checked>
                                <span class="ml-2">允许自动预约辅导</span>
                            </label>
                            <p class="text-xs text-gray-500 ml-6">当连续出错时，自动预约AI辅导课</p>
                        </div>
                        <div class="mb-3">
                            <label class="flex items-center">
                                <input type="checkbox" class="form-checkbox rounded text-primary" id="allow_auto_group" checked>
                                <span class="ml-2">允许自动创建学习小组</span>
                            </label>
                            <p class="text-xs text-gray-500 ml-6">找到相似水平同学，组建学习小组</p>
                        </div>
                        <div class="mb-3">
                            <label class="flex items-center">
                                <input type="checkbox" class="form-checkbox rounded text-primary" id="allow_auto_review" checked>
                                <span class="ml-2">允许自动安排复习计划</span>
                            </label>
                            <p class="text-xs text-gray-500 ml-6">根据遗忘曲线生成复习提醒</p>
                        </div>
                        <div class="mb-3">
                            <label class="flex items-center">
                                <input type="checkbox" class="form-checkbox rounded text-primary" id="allow_auto_purchase">
                                <span class="ml-2">允许自动购买课程</span>
                            </label>
                            <p class="text-xs text-gray-500 ml-6">需家长授权或设置预算</p>
                        </div>
                        <div class="mb-3" id="budget-field" style="display: none;">
                            <label class="block text-sm font-medium text-gray-700 mb-1">月度预算（元）</label>
                            <input type="number" class="w-full border-gray-300 rounded-lg shadow-sm" id="budget_limit" value="0" min="0">
                        </div>
                        <div class="mb-3" id="review-field" style="display: none;">
                            <label class="flex items-center">
                                <input type="checkbox" class="form-checkbox rounded text-primary" id="require_review_for_purchase" checked>
                                <span class="ml-2">购买需人工审核</span>
                            </label>
                        </div>
                        <button type="submit" class="w-full bg-primary text-white py-2 rounded-lg hover:bg-primary-dark transition">
                            保存设置
                        </button>
                    </form>
                </div>
            </div>

            <!-- 右侧：执行日志与手动触发 -->
            <div class="md:col-span-2">
                <!-- 手动触发卡片 -->
                <div class="bg-white p-6 rounded-xl shadow-soft mb-6">
                    <h3 class="font-semibold mb-4"><i class="fas fa-play me-2 text-success"></i>手动触发代理动作</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button class="btn btn-outline-primary" id="trigger-tutor">
                            <i class="fas fa-calendar-check me-2"></i>预约辅导
                        </button>
                        <button class="btn btn-outline-primary" id="trigger-group">
                            <i class="fas fa-users me-2"></i>创建学习小组
                        </button>
                        <button class="btn btn-outline-primary" id="trigger-review">
                            <i class="fas fa-clock me-2"></i>安排复习
                        </button>
                        <button class="btn btn-outline-primary" id="trigger-plan">
                            <i class="fas fa-tasks me-2"></i>运行每日计划
                        </button>
                    </div>
                    <div id="trigger-result" class="mt-3 text-sm text-green-600 hidden"></div>
                </div>

                <!-- 执行日志列表 -->
                <div class="bg-white p-6 rounded-xl shadow-soft">
                    <h3 class="font-semibold mb-4"><i class="fas fa-history me-2 text-info"></i>最近执行记录</h3>
                    <div id="logs-container">
                        <p class="text-gray-500 text-center py-4">加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
        $(document).ready(function() {
            loadSettings();
            loadLogs();

            // 显示/隐藏预算和审核字段
            $('#allow_auto_purchase').change(function() {
                if ($(this).is(':checked')) {
                    $('#budget-field, #review-field').slideDown();
                } else {
                    $('#budget-field, #review-field').slideUp();
                }
            });

            // 保存设置
            $('#permission-form').submit(function(e) {
                e.preventDefault();
                const data = {
                    allow_auto_tutor: $('#allow_auto_tutor').is(':checked'),
                    allow_auto_group: $('#allow_auto_group').is(':checked'),
                    allow_auto_review: $('#allow_auto_review').is(':checked'),
                    allow_auto_purchase: $('#allow_auto_purchase').is(':checked'),
                    budget_limit: $('#budget_limit').val(),
                    require_review_for_purchase: $('#require_review_for_purchase').is(':checked')
                };
                $.ajax({
                    url: '/api/agent/settings',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(data),
                    credentials: 'include',
                    success: function(res) {
                        if (res.success) {
                            alert('设置已保存');
                        }
                    },
                    error: function() {
                        alert('保存失败');
                    }
                });
            });

            // 手动触发动作
            function triggerAction(actionType, params = {}) {
                $.ajax({
                    url: '/api/agent/execute',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ actionType, params }),
                    credentials: 'include',
                    success: function(res) {
                        if (res.success) {
                            $('#trigger-result').removeClass('hidden').text(res.result.message || '执行成功').show();
                            setTimeout(() => $('#trigger-result').fadeOut(), 3000);
                            loadLogs(); // 刷新日志
                        } else {
                            alert(res.message || '执行失败');
                        }
                    },
                    error: function() {
                        alert('请求失败');
                    }
                });
            }

            $('#trigger-tutor').click(() => triggerAction('BOOK_TUTOR', { topic: '导数' }));
            $('#trigger-group').click(() => triggerAction('FORM_STUDY_GROUP', { topic: '微积分', peers: ['同学A', '同学B'] }));
            $('#trigger-review').click(() => triggerAction('SCHEDULE_REVIEW', { knowledgePoints: ['函数', '极限'] }));
           $('#trigger-plan').click(() => {
    $.ajax({
        url: '/api/agent/run-daily-plan',
        method: 'POST',   // 改为 POST
        xhrFields: { withCredentials: true },
        success: function(res) {
            if (res.success) {
                $('#trigger-result').removeClass('hidden').text('每日计划执行完成，共执行 ' + res.actions.length + ' 项动作').show();
                setTimeout(() => $('#trigger-result').fadeOut(), 3000);
                loadLogs();
            }
        },
        error: function() {
            alert('请求失败');
        }
    });
});

            function loadSettings() {
                $.ajax({
                    url: '/api/agent/settings',
                    method: 'GET',
                    credentials: 'include',
                    success: function(res) {
                        if (res.success) {
                            $('#allow_auto_tutor').prop('checked', res.permissions.allow_auto_tutor);
                            $('#allow_auto_group').prop('checked', res.permissions.allow_auto_group);
                            $('#allow_auto_review').prop('checked', res.permissions.allow_auto_review);
                            $('#allow_auto_purchase').prop('checked', res.permissions.allow_auto_purchase);
                            $('#budget_limit').val(res.permissions.budget_limit);
                            $('#require_review_for_purchase').prop('checked', res.permissions.require_review_for_purchase);
                            if (res.permissions.allow_auto_purchase) {
                                $('#budget-field, #review-field').show();
                            }
                        }
                    }
                });
            }

            function loadLogs() {
                $.ajax({
                    url: '/api/agent/logs',
                    method: 'GET',
                    credentials: 'include',
                    success: function(res) {
                        const container = $('#logs-container');
                        if (res.success && res.logs && res.logs.length > 0) {
                            let html = '';
                            res.logs.forEach(log => {
                                const params = JSON.parse(log.params || '{}');
                                const result = JSON.parse(log.result || '{}');
                                html += `
                                    <div class="log-item pl-4 py-3 border-b border-gray-100">
                                        <div class="flex justify-between">
                                            <span class="font-medium">${log.action_type}</span>
                                            <span class="text-xs text-gray-500">${new Date(log.executed_at).toLocaleString()}</span>
                                        </div>
                                        <p class="text-sm text-gray-600 mt-1">${result.message || '执行成功'}</p>
                                        <span class="text-xs text-${log.status === 'success' ? 'success' : 'danger'}">${log.status}</span>
                                    </div>
                                `;
                            });
                            container.html(html);
                        } else {
                            container.html('<p class="text-gray-500 text-center py-4">暂无执行记录</p>');
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
