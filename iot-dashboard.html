<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>硬件互联 - EduSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/daohanglan.js"></script>
</head>
<body class="bg-gray-50">
    <main class="container mx-auto px-4 pt-24">
        <h1 class="text-3xl font-bold mb-6"><i class="fas fa-microchip text-primary me-2"></i>硬件互联实验平台</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-4 rounded shadow">
                <h3 class="font-semibold">3D打印机</h3>
                <p class="text-sm text-gray-600">状态: <span class="text-green-600">在线</span></p>
                <button class="btn btn-sm btn-primary mt-2" onclick="simulatePrint()">开始打印几何模型</button>
            </div>
            <div class="bg-white p-4 rounded shadow">
                <h3 class="font-semibold">Arduino 传感器套件</h3>
                <p class="text-sm text-gray-600">状态: <span class="text-green-600">在线</span></p>
                <button class="btn btn-sm btn-primary mt-2" onclick="simulateSensor()">读取温度</button>
            </div>
            <div class="bg-white p-4 rounded shadow">
                <h3 class="font-semibold">AI视觉摄像头</h3>
                <p class="text-sm text-gray-600">状态: <span class="text-yellow-600">待连接</span></p>
                <button class="btn btn-sm btn-outline-primary mt-2">连接设备</button>
            </div>
        </div>
        <div class="mt-6 bg-white p-4 rounded shadow">
            <h3 class="font-semibold">操作记录与知识映射</h3>
            <div id="iot-log"></div>
        </div>
    </main>
    <script src="/js/iot.js"></script>
</body>
</html>
