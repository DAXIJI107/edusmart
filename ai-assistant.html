<body class="bg-gray-50">
    <main class="container mx-auto px-4 pt-24 pb-12">
        <div class="max-w-4xl mx-auto">
            <!-- ========== AI 助手聊天卡片 ========== -->
            <div class="card ai-chat-card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">

                    </div>
                    <div class="emotion-indicator hidden" id="emotion-indicator">

                        <span id="emotion-text" class="font-medium">中性</span>
                        <span class="mx-2">|</span>
                        <span>学习韧性：</span>
                        <span id="resilience-text" class="font-medium">良好</span>
                    </div>
                    <div class="chat-container" id="chat-container">
                        <div class="ai-message">
                            <div class="message-avatar"><i class="fas fa-robot"></i></div>
                            <div class="message-content">
                                <div class="message-header"><strong>AI助手</strong><span class="message-time">刚刚</span></div>
                                <div class="message-text">你好！如果你有不懂的知识点，可以直接告诉我，我会通过提问引导你思考。</div>
                            </div>

                        <button class="btn btn-sm btn-outline-secondary quick-action-btn" data-prompt="我不懂极限">不懂极限</button>
                        <button class="btn btn-sm btn-outline-secondary quick-action-btn" data-prompt="help me with integral">help with integral</button>

            <!-- ========== 英语口语评测面板 ========== -->

                <div class="card-body">
                    <h5><i class="fas fa-headphones"></i> 中英互译听力训练</h5>
                    <p class="text-muted">实时将听到的中文转为英文并朗读</p>

                        <div class="col-md-6">
                            <h6>🇨🇳 识别中文</h6>

                        </div>

                            <h6>🇺🇸 英文翻译</h6>

                    <div class="mt-2">
                        <button class="btn btn-sm btn-outline-secondary" id="play-translation-btn" disabled>

    <div class="thinking-indicator bg-white shadow-lg rounded-lg px-4 py-2 hidden" id="thinking-indicator">
        <div class="d-flex align-items-center">
            <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
            <span>AI助手正在思考...</span>
        </div>
    </div>

    <script>
        // ==================== 星火大模型相关（原有逻辑） ====================
        const SPARK_CONFIG = { apiUrl: '/api/spark-proxy' };

        function getCurrentUserId() {
            return window.userProfile ? window.userProfile.getProfile().id : null;
        }

        function getToken() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'token') return value;
            }
            return localStorage.getItem('token');
        }

        function addMessage(content, isUser = false) {
            const container = document.getElementById('chat-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            const header = document.createElement('div');
            header.className = 'message-header d-flex justify-content-between align-items-center';
            header.innerHTML = `<strong>${isUser ? '你' : 'AI助手'}</strong><span class="message-time">${new Date().toLocaleTimeString()}</span>`;
            const text = document.createElement('div');
            text.className = 'message-text';
            text.textContent = content;
            messageContent.appendChild(header);
            messageContent.appendChild(text);
            if (isUser) {
                messageDiv.appendChild(messageContent);
                messageDiv.appendChild(avatar);
            } else {
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(messageContent);
            }
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function showThinking() {
            document.getElementById('thinking-indicator').classList.remove('hidden');
        }
        function hideThinking() {
            document.getElementById('thinking-indicator').classList.add('hidden');
        }

        async function callSparkModel(userMessage, subject) {
            const systemPrompt = `你是一个AI学习助手，采用苏格拉底式提问引导学生思考。核心原则：
- 绝对不直接给出答案或解题步骤。
- 针对学生提出的不懂的知识点，拆解成递进式小问题，引导学生自己发现答案。
- 语气鼓励、耐心，根据学科（${subject}）特点调整提问方式。
- 如果学生表现出困惑或沮丧，先共情再提问。`;
            const response = await fetch(SPARK_CONFIG.apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userMessage }
                    ]
                })
            });
            if (!response.ok) throw new Error(`请求失败: ${response.status}`);
            const data = await response.json();
            if (data.choices && data.choices.length > 0) {
                return data.choices[0].message.content;
            } else {
                throw new Error('星火API返回数据异常');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('ai-question');
            const subject = document.getElementById('subject-select').value;
            const message = input.value.trim();
            if (!message) return;
            addMessage(message, true);
            input.value = '';
            showThinking();
            try {
                let currentEmotion = 'neutral';
                try {
                    const emotionRes = await fetch('/api/emotion/recognize', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ text: message, responseTime: 0, errorCount: 0 })
                    });
                    const emotionData = await emotionRes.json();
                    if (emotionData.success) {
                        currentEmotion = emotionData.emotion;
                        const indicator = document.getElementById('emotion-indicator');
                        const emotionText = document.getElementById('emotion-text');
                        let emotionDisplay = '😐 中性';
                        if (currentEmotion === 'frustrated') emotionDisplay = '😟 沮丧';
                        else if (currentEmotion === 'happy') emotionDisplay = '😊 开心';
                        else if (currentEmotion === 'distracted') emotionDisplay = '😕 分心';
                        else if (currentEmotion === 'confused') emotionDisplay = '🤔 困惑';
                        emotionText.textContent = emotionDisplay;
                        indicator.classList.remove('hidden');
                    }
                } catch (err) { console.warn('情感识别失败:', err); }

                let aiResponse = '';
                try {
                    aiResponse = await callSparkModel(message, subject);
                } catch (sparkError) {
                    console.error('星火模型调用失败:', sparkError);
                    if (message.includes('不懂') || message.includes('help')) {
                        aiResponse = '暂时无法连接星火大模型，请稍后再试。您可以尝试重新描述问题。';
                    } else {
                        aiResponse = '请描述你不懂的知识点，例如“我不懂函数”。';
                    }
                }
                addMessage(aiResponse);

                const userId = getCurrentUserId();
                if (userId) {
                    fetch('/api/emotion/predict-resilience', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ studentId: userId })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.intervention) {
                            const tip = document.createElement('div');
                            tip.className = 'alert alert-info alert-dismissible fade show mt-2';
                            tip.innerHTML = `${data.intervention.message}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
                            document.querySelector('.ai-chat-card .card-body').prepend(tip);
                            setTimeout(() => tip.remove(), 5000);
                            const resilienceText = document.getElementById('resilience-text');
                            if (data.risk > 0.7) resilienceText.textContent = '较低';
                            else if (data.risk > 0.4) resilienceText.textContent = '中等';
                            else resilienceText.textContent = '良好';
                        }
                    })
                    .catch(err => console.warn('韧性预测失败:', err));
                }
            } catch (error) {
                addMessage(`系统错误: ${error.message}`);
            } finally {
                hideThinking();
            }
        }

        function refreshChat() {
            if (confirm('确定要清空当前对话吗？')) {
                document.getElementById('chat-container').innerHTML = `
                    <div class="ai-message">
                        <div class="message-avatar"><i class="fas fa-robot"></i></div>
                        <div class="message-content">
                            <div class="message-header"><strong>AI助手</strong><span class="message-time">刚刚</span></div>
                            <div class="message-text">你好！如果你有不懂的知识点，可以直接告诉我，我会通过提问引导你思考。</div>
                        </div>
                    </div>
                `;
            }
        }

        $(document).ready(function() {
            $('#send-btn').on('click', sendMessage);
            $('#ai-question').on('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });
            $('.quick-action-btn').on('click', function() {
                $('#ai-question').val($(this).data('prompt'));
                sendMessage();
            });
            $('#refresh-chat').on('click', refreshChat);
        });

        // ==================== 讯飞语音功能（二进制音频帧版） ====================
        class PCMRecorder {
            constructor(sampleRate = 16000, bufferSize = 4096) {
                this.sampleRate = sampleRate;
                this.bufferSize = bufferSize;
                this.audioContext = null;
                this.processor = null;
                this.stream = null;
                this.onAudioData = null; // 回调参数: Int16Array
            }
            async start() {
                this.stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: { ideal: this.sampleRate },
                        channelCount: { ideal: 1 },
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: this.sampleRate });
                if (this.audioContext.state === 'suspended') {
                    await this.audioContext.resume();
                }
                const source = this.audioContext.createMediaStreamSource(this.stream);
                this.processor = this.audioContext.createScriptProcessor(this.bufferSize, 1, 1);
                source.connect(this.processor);
                this.processor.connect(this.audioContext.destination);
                this.processor.onaudioprocess = (e) => {
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcm = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        pcm[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                    }
                    if (this.onAudioData) this.onAudioData(pcm);
                };
            }
            stop() {
                if (this.processor) {
                    this.processor.disconnect();
                    this.processor = null;
                }
                if (this.stream) {
                    this.stream.getTracks().forEach(t => t.stop());
                    this.stream = null;
                }
                if (this.audioContext && this.audioContext.state !== 'closed') {
                    this.audioContext.close();
                    this.audioContext = null;
                }
            }
        }

        // ========== 场景一：英语口语评测 ==========
        let iseRecorder = null;
        let iseWs = null;
        let iseAppId = '';

        async function startIse() {
    if (iseRecorder) { iseRecorder.stop(); iseRecorder = null; }
    if (iseWs) { if (iseWs.readyState === WebSocket.OPEN) iseWs.close(); iseWs = null; }

    try {
        const resp = await fetch('/api/xfyun/ise-url');
        const { url, appId } = await resp.json();
        iseAppId = appId;

        iseWs = new WebSocket(url);
        iseWs.binaryType = 'arraybuffer';

        iseWs.onopen = () => {
            const evalText = document.getElementById('eval-text').innerText.trim();
            // 首包：启动评测会话
            iseWs.send(JSON.stringify({
                common: { app_id: iseAppId },
                business: {
                    cmd: 'ssb',               // 开始评测
                    category: 'read_sentence',
                    ent: 'en_vip',
                    text: evalText
                },
                data: { status: 0 }
            }));
            // 第二包：开始发送音频（注意：音频帧需要单独发送，不能合并）
            iseWs.send(JSON.stringify({
                common: { app_id: iseAppId },
                business: { cmd: 'auw' },    // 音频上传
                data: { status: 1 }
            }));
        };

        iseWs.onmessage = (e) => {
            const res = JSON.parse(e.data);
            if (res.code !== 0) {
                console.error('ISE 错误', res);
                document.getElementById('ise-detail').innerText = `评测出错：${res.message} (${res.code})`;
                return;
            }
            if (res.data && res.data.status === 2) {
                const result = JSON.parse(res.data.result);
                document.getElementById('ise-score').style.display = 'inline-block';
                document.getElementById('ise-score').innerText = `得分: ${result.total_score.toFixed(1)}`;
                let detailHtml = '';
                result.words.forEach(w => {
                    const color = w.score > 80 ? 'green' : w.score > 50 ? 'orange' : 'red';
                    detailHtml += `<span style="color:${color}; margin:0 4px;">${w.word}</span>`;
                });
                document.getElementById('ise-detail').innerHTML = detailHtml;
            }
        };

        iseWs.onerror = (e) => console.error('ISE WS error', e);
        iseWs.onclose = () => console.log('ISE 连接关闭');

        // 开始录音
        iseRecorder = new PCMRecorder(16000, 4096);
        iseRecorder.onAudioData = (pcm) => {
            if (iseWs && iseWs.readyState === WebSocket.OPEN) {
                iseWs.send(pcm.buffer);
            }
        };
        await iseRecorder.start();

        document.getElementById('ise-start-btn').disabled = true;
        document.getElementById('ise-stop-btn').disabled = false;
    } catch (err) {
        alert('启动评测失败：' + err.message);
    }
}

function stopIse() {
    if (iseWs && iseWs.readyState === WebSocket.OPEN) {
        // 发送结束帧
        iseWs.send(JSON.stringify({
            common: { app_id: iseAppId },
            business: { cmd: 'ssb' },
            data: { status: 2 }
        }));
        setTimeout(() => {
            if (iseWs.readyState === WebSocket.OPEN) iseWs.close();
        }, 200);
    }
    if (iseRecorder) iseRecorder.stop();
    document.getElementById('ise-start-btn').disabled = false;
    document.getElementById('ise-stop-btn').disabled = true;
}

        // ========== 场景二：演讲实时翻译（ASR 也改成二进制帧） ==========
        let speechRecorder = null;
        let speechWs = null;
        let speechAppId = '';

        async function startSpeech() {
    if (speechRecorder) { speechRecorder.stop(); speechRecorder = null; }
    if (speechWs) { if (speechWs.readyState === WebSocket.OPEN) speechWs.close(); speechWs = null; }

    try {
        // 使用标准实时语音转写接口
        const resp = await fetch('/api/xfyun/asr-url');
        const { url, appId } = await resp.json();
        speechAppId = appId;

        speechWs = new WebSocket(url);
        speechWs.binaryType = 'arraybuffer';

        speechWs.onopen = () => {
            // 首包：配置参数
            speechWs.send(JSON.stringify({
                common: { app_id: speechAppId },
                business: {
                    language: 'zh_cn',
                    domain: 'iat',        // 听写领域
                    accent: 'mandarin',
                    ptt: 0
                },
                data: { status: 0, format: 'audio/L16;rate=16000', encoding: 'raw' }
            }));
            // 第二包：开始发送音频
            speechWs.send(JSON.stringify({
                common: { app_id: speechAppId },
                business: {},
                data: { status: 1, format: 'audio/L16;rate=16000', encoding: 'raw' }
            }));
        };

        speechWs.onmessage = async (e) => {
            const res = JSON.parse(e.data);
            if (res.code !== 0) {
                console.error('ASR错误', res);
                return;
            }
            if (res.data && res.data.result) {
                let text = '';
                if (res.data.result.ws) {
                    text = res.data.result.ws.reduce((s, w) => s + w.cw.map(c => c.w).join(''), '');
                } else if (res.data.result.text) {
                    text = res.data.result.text;
                }
                const cnDiv = document.getElementById('speech-cn');
                if (res.data.status === 2) {   // 最终结果
                    cnDiv.innerText += text;
                    // 翻译
                    try {
                        const transRes = await fetch('/api/xfyun/translate', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text, from: 'cn', to: 'en' })
                        });
                        const { translation } = await transRes.json();
                        document.getElementById('speech-en').innerText += translation + ' ';
                    } catch (err) { console.warn('翻译失败', err); }
                } else {
                    cnDiv.innerText = (cnDiv.innerText || '') + text;
                }
            }
        };

        speechRecorder = new PCMRecorder(16000, 4096);
        speechRecorder.onAudioData = (pcm) => {
            if (speechWs && speechWs.readyState === WebSocket.OPEN) {
                speechWs.send(pcm.buffer);
            }
        };
        await speechRecorder.start();

        document.getElementById('speech-start-btn').disabled = true;
        document.getElementById('speech-stop-btn').disabled = false;
    } catch (err) {
        alert('启动失败：' + err.message);
    }
}

function stopSpeech() {
    if (speechWs && speechWs.readyState === WebSocket.OPEN) {
        speechWs.send(JSON.stringify({
            common: { app_id: speechAppId },
            business: {},
            data: { status: 2, format: 'audio/L16;rate=16000', encoding: 'raw' }
        }));
        setTimeout(() => speechWs.close(), 200);
    }
    if (speechRecorder) speechRecorder.stop();
    document.getElementById('speech-start-btn').disabled = false;
    document.getElementById('speech-stop-btn').disabled = true;
}

        // ========== 场景三：中英互译听力训练（ASR 二进制帧） ==========
        let listenRecorder = null;
        let listenWs = null;
        let listenAppId = '';
        let lastTranslation = '';

        async function startListen() {
    if (listenRecorder) { listenRecorder.stop(); listenRecorder = null; }
    if (listenWs) { if (listenWs.readyState === WebSocket.OPEN) listenWs.close(); listenWs = null; }

    try {
        const resp = await fetch('/api/xfyun/asr-url');
        const { url, appId } = await resp.json();
        listenAppId = appId;

        listenWs = new WebSocket(url);
        listenWs.binaryType = 'arraybuffer';

        listenWs.onopen = () => {
            listenWs.send(JSON.stringify({
                common: { app_id: listenAppId },
                business: { language: 'zh_cn', domain: 'iat', accent: 'mandarin', ptt: 0 },
                data: { status: 0, format: 'audio/L16;rate=16000', encoding: 'raw' }
            }));
            listenWs.send(JSON.stringify({
                common: { app_id: listenAppId },
                business: {},
                data: { status: 1, format: 'audio/L16;rate=16000', encoding: 'raw' }
            }));
        };

        listenWs.onmessage = async (e) => {
            const res = JSON.parse(e.data);
            if (res.code !== 0) return;
            if (res.data && res.data.result) {
                let text = '';
                if (res.data.result.ws) {
                    text = res.data.result.ws.reduce((s, w) => s + w.cw.map(c => c.w).join(''), '');
                } else if (res.data.result.text) {
                    text = res.data.result.text;
                }
                const cnDiv = document.getElementById('listen-cn');
                if (res.data.status === 2) {
                    cnDiv.innerText += text;
                    try {
                        const transRes = await fetch('/api/xfyun/translate', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text, from: 'cn', to: 'en' })
                        });
                        const { translation } = await transRes.json();
                        document.getElementById('listen-en').innerText += translation + ' ';
                        lastTranslation = translation;
                        document.getElementById('play-translation-btn').disabled = false;
                    } catch (err) { console.warn('翻译失败', err); }
                } else {
                    cnDiv.innerText = (cnDiv.innerText || '') + text;
                }
            }
        };

        listenRecorder = new PCMRecorder(16000, 4096);
        listenRecorder.onAudioData = (pcm) => {
            if (listenWs && listenWs.readyState === WebSocket.OPEN) {
                listenWs.send(pcm.buffer);
            }
        };
        await listenRecorder.start();

        document.getElementById('listen-start-btn').disabled = true;
        document.getElementById('listen-stop-btn').disabled = false;
    } catch (err) {
        alert('启动失败：' + err.message);
    }
}

function stopListen() {
    if (listenWs && listenWs.readyState === WebSocket.OPEN) {
        listenWs.send(JSON.stringify({
            common: { app_id: listenAppId },
            business: {},
            data: { status: 2, format: 'audio/L16;rate=16000', encoding: 'raw' }
        }));
        setTimeout(() => listenWs.close(), 200);
    }
    if (listenRecorder) listenRecorder.stop();
    document.getElementById('listen-start-btn').disabled = false;
    document.getElementById('listen-stop-btn').disabled = true;
    document.getElementById('play-translation-btn').disabled = true;
}

        async function playTranslation() {
            if (!lastTranslation) return;
            try {
                const resp = await fetch('/api/xfyun/tts-url');
                const { url, appId } = await resp.json();
                const ttsWs = new WebSocket(url);
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });

                ttsWs.onopen = () => {
                    ttsWs.send(JSON.stringify({
                        common: { app_id: appId },
                        business: { aue: 'raw', auf: 'audio/L16;rate=16000', vcn: 'x2_catherine', tte: 'utf8' },
                        data: { status: 0, text: btoa(unescape(encodeURIComponent(lastTranslation))) }
                    }));
                };

                ttsWs.onmessage = (e) => {
                    const res = JSON.parse(e.data);
                    if (res.code !== 0) return;
                    if (res.data.audio) {
                        const pcmStr = atob(res.data.audio);
                        const pcm = new Int16Array(pcmStr.length / 2);
                        for (let i = 0; i < pcm.length; i++) {
                            pcm[i] = pcmStr.charCodeAt(i*2) | (pcmStr.charCodeAt(i*2+1) << 8);
                        }
                        const buffer = audioCtx.createBuffer(1, pcm.length, 16000);
                        buffer.getChannelData(0).set(Array.from(pcm).map(v => v / 32768));
                        const source = audioCtx.createBufferSource();
                        source.buffer = buffer;
                        source.connect(audioCtx.destination);
                        source.start();
                    }
                    if (res.data.status === 2) ttsWs.close();
                };
            } catch (err) { alert('语音合成失败：' + err.message); }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('ise-start-btn').addEventListener('click', startIse);
            document.getElementById('ise-stop-btn').addEventListener('click', stopIse);
            document.getElementById('speech-start-btn').addEventListener('click', startSpeech);
            document.getElementById('speech-stop-btn').addEventListener('click', stopSpeech);
            document.getElementById('listen-start-btn').addEventListener('click', startListen);
            document.getElementById('listen-stop-btn').addEventListener('click', stopListen);
            document.getElementById('play-translation-btn').addEventListener('click', playTranslation);
        });
    </script>
