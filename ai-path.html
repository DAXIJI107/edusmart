<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能学习路径 - EduSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/unified-styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="/js/daohanglan.js"></script>
    <script src="/js/user-profile.js"></script>
    <style>
        .node circle { stroke: #fff; stroke-width: 1.5px; }
        .node text { font: 10px sans-serif; }
        .link { stroke: #999; stroke-opacity: 0.6; }
        .mastery-0 { fill: #f87171; }
        .mastery-1 { fill: #fbbf24; }
        .mastery-2 { fill: #34d399; }
    </style>
</head>
<body class="bg-gray-50">
    <main class="container mx-auto px-4 pt-24 pb-12">
        <div class="text-center mb-10 animate-fade-in">
            <div class="inline-flex items-center justify-center bg-primary/10 text-primary rounded-full px-4 py-1 mb-3">
                <i class="fas fa-route mr-2"></i>
                <span>自适应学习</span>
            </div>
            <h1 class="text-4xl font-bold text-gray-800 mb-3">
                你的专属学习路径
            </h1>
            <p class="text-gray-600 max-w-2xl mx-auto text-lg">
                基于你的学习数据，AI为你规划了最优学习顺序，帮你高效掌握每个知识点
            </p>
        </div>

        <!-- 学习进度概览卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="stat-card bg-white p-4 rounded-xl shadow-soft">
                <div class="flex items-center">
                    <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-xl mr-3">
                        <i class="fas fa-brain"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">知识点总数</p>
                        <p class="text-2xl font-bold" id="total-knowledge">0</p>
                    </div>
                </div>
            </div>
            <div class="stat-card bg-white p-4 rounded-xl shadow-soft">
                <div class="flex items-center">
                    <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center text-green-600 text-xl mr-3">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">已掌握</p>
                        <p class="text-2xl font-bold" id="mastered-count">0</p>
                    </div>
                </div>
            </div>
            <div class="stat-card bg-white p-4 rounded-xl shadow-soft">
                <div class="flex items-center">
                    <div class="w-12 h-12 rounded-full bg-yellow-100 flex items-center justify-center text-yellow-600 text-xl mr-3">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">待学习</p>
                        <p class="text-2xl font-bold" id="to-learn-count">0</p>
                    </div>
                </div>
            </div>
            <div class="stat-card bg-white p-4 rounded-xl shadow-soft">
                <div class="flex items-center">
                    <div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center text-purple-600 text-xl mr-3">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">预计完成时间</p>
                        <p class="text-2xl font-bold" id="estimate-time">--</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 视图切换按钮 -->
        <div class="flex justify-end mb-4">
            <button id="view-mode" class="btn btn-sm btn-outline-primary">
                <i class="fas fa-project-diagram me-1"></i> 切换视图
            </button>
            <button id="refresh-path" class="btn btn-sm btn-outline-secondary ms-2">
                <i class="fas fa-sync-alt me-1"></i> 刷新
            </button>
        </div>

        <!-- 卡片视图容器 -->
        <div id="path-container" class="space-y-4"></div>

        <!-- 图形视图容器（初始隐藏） -->
        <div id="graph-container" class="hidden bg-white p-4 rounded-lg shadow-soft" style="height: 500px;"></div>
    </main>

    <script src="/js/ai-path.js"></script>
</body>
</html>
