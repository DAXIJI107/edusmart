<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart - 智能学习中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/unified-styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/daohanglan.js"></script>
    <script src="js/user-profile.js"></script>
    <style>
        .dashboard-card {
            background: white; border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }
        .dashboard-card:hover { transform: translateY(-4px); box-shadow: 0 20px 30px -10px rgba(102,126,234,0.2); }
        .progress-ring {
            width: 80px; height: 80px; border-radius: 50%;
            background: conic-gradient(#667eea 0deg 270deg, #e9ecef 270deg 360deg);
            display: flex; align-items: center; justify-content: center;
        }
        .progress-ring-inner {
            width: 60px; height: 60px; border-radius: 50%; background: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #667eea;
        }
    </style>
</head>
<body class="bg-gray-50">
    <main class="container mx-auto px-4 pt-28 pb-12">
        <!-- 欢迎区域 -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">👋 欢迎回来，<span id="username">同学</span>！</h1>
                <p class="text-gray-600 mt-1">今天是你连续学习的第 <span class="font-semibold text-primary" id="continuous-days">0</span> 天，继续保持！</p>
            </div>
            <div class="hidden md:block text-right">
                <p class="text-sm text-gray-500">上次登录：<span id="last-login">加载中...</span></p>
            </div>
        </div>

        <!-- 主要仪表盘卡片网格 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <!-- 学习总时长卡片 -->
            <div class="dashboard-card p-6 flex items-center space-x-4">
                <div class="w-14 h-14 rounded-2xl bg-primary-light flex items-center justify-center text-primary text-2xl">
                    <i class="fas fa-clock"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500">学习总时长</p>
                    <p class="text-2xl font-bold text-gray-800"><span id="stat-study-hours">0</span> <span class="text-sm font-normal text-gray-500">小时</span></p>
                    <p class="text-xs text-success">↑ <span id="hours-trend">0</span>% 较上周</p>
                </div>
            </div>

            <!-- 知识点掌握卡片 -->
            <div class="dashboard-card p-6 flex items-center space-x-4">
                <div class="w-14 h-14 rounded-2xl bg-success-light flex items-center justify-center text-success text-2xl">
                    <i class="fas fa-brain"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500">知识点掌握</p>
                    <p class="text-2xl font-bold text-gray-800"><span id="stat-mastery">0</span>%</p>
                    <p class="text-xs text-success">↑ <span id="mastery-trend">0</span>% 较上周</p>
                </div>
            </div>

            <!-- 学习效率卡片 -->
            <div class="dashboard-card p-6 flex items-center space-x-4">
                <div class="w-14 h-14 rounded-2xl bg-warning-light flex items-center justify-center text-warning text-2xl">
                    <i class="fas fa-bolt"></i>
                </div>
                <div>
                    <p class="text-sm text-gray-500">学习效率</p>
                    <p class="text-2xl font-bold text-gray-800"><span id="stat-efficiency">0</span>%</p>
                    <p class="text-xs text-danger">↓ <span id="efficiency-trend">0</span>% 较上周</p>
                </div>
            </div>

            <!-- 今日任务进度卡片（环形进度条） -->
            <div class="dashboard-card p-6 flex items-center space-x-4">
                <div class="progress-ring">
                    <div class="progress-ring-inner"><span id="task-progress">0</span>%</div>
                </div>
                <div>
                    <p class="text-sm text-gray-500">今日任务</p>
                    <p class="text-lg font-bold text-gray-800">完成 <span id="task-done">0</span>/<span id="task-total">0</span></p>
                    <p class="text-xs text-primary">还剩 <span id="task-left">0</span> 项</p>
                </div>
            </div>
        </div>

        <!-- 第二行：学习路径概览 + 推荐课程（结构保留，动态填充） -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 左侧：当前学习路径 -->
            <div class="lg:col-span-2 dashboard-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold text-gray-800">📌 当前学习路径</h3>
                    <a href="ai-path.html" class="text-sm text-primary hover:underline">查看全部 <i class="fas fa-arrow-right ml-1"></i></a>
                </div>
                <div class="space-y-3" id="path-list">
                    <!-- 动态生成路径 -->
                    <div class="text-center text-gray-400 py-4">加载中...</div>
                </div>
            </div>

            <!-- 右侧：推荐课程 -->
            <div class="dashboard-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold text-gray-800">🎓 为你推荐</h3>
                    <a href="course.html" class="text-sm text-primary hover:underline">更多</a>
                </div>
                <div id="recommend-courses" class="space-y-4">
                    <div class="text-center text-gray-400 py-4">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 第三行：学习日历 + 今日成就（保持占位，暂不动态化） -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
            <div class="dashboard-card p-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">📅 学习日历</h3>
                <div class="grid grid-cols-7 gap-1 text-center text-sm">
                    <span class="text-gray-500">一</span><span class="text-gray-500">二</span><span class="text-gray-500">三</span><span class="text-gray-500">四</span><span class="text-gray-500">五</span><span class="text-gray-500">六</span><span class="text-gray-500">日</span>
                    <!-- 静态占位，后续可动态生成 -->
                    <span class="p-2 bg-gray-100 rounded">1</span><span class="p-2 bg-gray-100 rounded">2</span><span class="p-2 bg-gray-100 rounded">3</span><span class="p-2 bg-gray-100 rounded">4</span><span class="p-2 bg-gray-100 rounded">5</span><span class="p-2 bg-gray-100 rounded bg-primary-light text-primary">6</span><span class="p-2 bg-gray-100 rounded">7</span>
                </div>
            </div>

            <div class="dashboard-card p-6">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">🏆 今日成就</h3>
                <ul class="space-y-2">
                    <li class="flex items-center text-gray-700"><i class="fas fa-check-circle text-success mr-2"></i><span id="achievement1">加载中...</span></li>
                    <li class="flex items-center text-gray-700"><i class="fas fa-check-circle text-success mr-2"></i><span id="achievement2">加载中...</span></li>
                </ul>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            // 1. 从 userProfile 获取基础数据
            const profile = window.userProfile ? window.userProfile.getProfile() : {};
            document.getElementById('username').textContent = profile.nickname || profile.username || '同学';
            const stats = profile.studyStats || {};

            // 填充仪表盘数值
            document.getElementById('stat-study-hours').textContent = stats.studyHours || 0;
            document.getElementById('stat-mastery').textContent = stats.knowledgeMastery || 0;
            document.getElementById('stat-efficiency').textContent = stats.studyEfficiency || 0;
            document.getElementById('continuous-days').textContent = stats.continuousDays || 0;
            document.getElementById('task-progress').textContent = stats.knowledgeMastery || 0; // 临时用掌握度
            document.getElementById('last-login').textContent = new Date().toLocaleString();
            // 趋势数据暂设为0（可后续接入）
            document.getElementById('hours-trend').textContent = 0;
            document.getElementById('mastery-trend').textContent = 0;
            document.getElementById('efficiency-trend').textContent = 0;

            // 2. 加载学习路径（显示前4个）
            try {
                const pathRes = await fetch('/api/ai/learning-path', { method: 'POST', credentials: 'include' });
                const pathData = await pathRes.json();
                if (pathData.success && pathData.data && pathData.data.steps) {
                    const steps = pathData.data.steps.slice(0, 4);
                    const html = steps.map(s => `
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-gray-700">${s.name}</span>
                                <span class="${s.mastery>=80 ? 'text-primary' : s.mastery>=50 ? 'text-warning' : 'text-danger'}">${s.mastery}%</span>
                            </div>
                            <div class="progress h-2">
                                <div class="progress-bar" style="width:${s.mastery}%"></div>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('path-list').innerHTML = html;
                } else {
                    document.getElementById('path-list').innerHTML = '<div class="text-center text-gray-400">暂无学习数据</div>';
                }
            } catch (e) {
                document.getElementById('path-list').innerHTML = '<div class="text-center text-gray-400">加载失败</div>';
            }

            // 3. 加载推荐课程（简单模拟，从知识库取前两个有bvid的）
            try {
                const courseRes = await fetch('/api/ai/learning-path', { method: 'POST', credentials: 'include' });
                const courseData = await courseRes.json();
                if (courseData.success && courseData.data && courseData.data.steps) {
                    const courses = courseData.data.steps.filter(s => s.bvid).slice(0, 2);
                    const html = courses.length ? courses.map(c => `
                        <div class="flex space-x-3 cursor-pointer" onclick="location.href='course-detail.html?knowledgeId=${c.id}'">
                            <div class="w-16 h-16 rounded-lg bg-gray-200 flex items-center justify-center">
                                <i class="fas fa-play text-gray-500 text-2xl"></i>
                            </div>
                            <div class="flex-1">
                                <h4 class="font-medium text-gray-800">${c.name}</h4>
                                <p class="text-xs text-gray-500 mt-1">${c.difficulty}</p>
                            </div>
                        </div>
                    `).join('') : '<div class="text-center text-gray-400">暂无推荐</div>';
                    document.getElementById('recommend-courses').innerHTML = html;
                }
            } catch(e) {}

            // 4. 成就占位
            document.getElementById('achievement1').textContent = `连续学习${stats.continuousDays||0}天`;
            document.getElementById('achievement2').textContent = `完成了${stats.completedCourses||0}门课程`;
        });
    </script>
</body>
</html>
